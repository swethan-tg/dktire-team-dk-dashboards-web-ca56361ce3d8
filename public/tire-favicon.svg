<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tire outer ring -->
  <circle cx="50" cy="50" r="45" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Tire inner ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- Tire tread marks -->
  <g stroke="#555" stroke-width="1.5" fill="none">
    <!-- Top tread -->
    <line x1="50" y1="15" x2="50" y2="25"/>
    <!-- Right tread -->
    <line x1="85" y1="50" x2="75" y2="50"/>
    <!-- Bottom tread -->
    <line x1="50" y1="85" x2="50" y2="75"/>
    <!-- Left tread -->
    <line x1="15" y1="50" x2="25" y2="50"/>
    <!-- Diagonal treads -->
    <line x1="72" y1="28" x2="65" y2="35"/>
    <line x1="72" y1="72" x2="65" y2="65"/>
    <line x1="28" y1="72" x2="35" y2="65"/>
    <line x1="28" y1="28" x2="35" y2="35"/>
  </g>
  
  <!-- Center rim -->
  <circle cx="50" cy="50" r="12" fill="#1d63f2" stroke="#0f46c8" stroke-width="1"/>
  <circle cx="50" cy="50" r="8" fill="#c5d8ff"/>
</svg>