clone:
  depth: full

definitions:
  steps:

    - step: &deploy_step
        name: Build and Push Docker Image
        runs-on:
          - self.hosted
          - linux.shell
          - dev
        script:
          - &deploy_script |
              set -e

              unset DOCKER_HOST

              IMAGE_NAME="dk-dashboards-web"
              AWS_REGION="us-east-2"
              IMAGE_TAG="${BITBUCKET_BUILD_NUMBER}"

              ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_NAME}"

              echo "Building Docker image: ${IMAGE_NAME}:${IMAGE_TAG}"
              docker build --no-cache -t "${IMAGE_NAME}:${IMAGE_TAG}" .

              echo "Logging in to AWS ECR"
              aws ecr get-login-password --region "${AWS_REGION}" \
                | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

              echo "Tagging Docker image"
              docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"

              echo "Pushing Docker image"
              docker push "${ECR_URI}:${IMAGE_TAG}"

              # echo "Updating task definition: ${TASK_DEFINITION_FILE}"
              # sed -i "s/#{buildId}#/${IMAGE_TAG}/g" "${TASK_DEFINITION_FILE}"

              # echo "Registering ECS task definition"
              # TASK_ARN=$(aws ecs register-task-definition \
              #   --cli-input-json "file://${TASK_DEFINITION_FILE}" \
              #   --query 'taskDefinition.taskDefinitionArn' \
              #   --output text)

              # echo "Registered task definition: ${TASK_ARN}"

              # echo "Updating ECS service: ${ECS_SERVICE_NAME}"
              # aws ecs update-service \
              #   --cluster "${ECS_CLUSTER_NAME}" \
              #   --service "${ECS_SERVICE_NAME}" \
              #   --task-definition "${TASK_ARN}"
        after-script:
          - |
              unset DOCKER_HOST
              echo "Cleaning Docker data after pipeline step..."

              IMAGE_NAME="dk-web-admin-api"
              IMAGE_TAG="${BITBUCKET_BUILD_NUMBER}"

              echo "Removing local build image if exists"
              docker rmi "${IMAGE_NAME}:${IMAGE_TAG}" || true

              echo "Removing dangling/unused Docker images"
              docker image prune -af || true

              echo "Removing Docker build cache"
              docker builder prune -af || true

              echo "Removing stopped containers"
              docker container prune -f || true

              echo "Docker disk usage after cleanup"
              docker system df || true

pipelines:
  branches:
    staging:
      - step:
          <<: *deploy_step
          script:
            - export AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID_DEV}"
            - export ECS_CLUSTER_NAME="${ECS_CLUSTER_NAME_STAGE}"
            - export ECS_SERVICE_NAME="arn:aws:ecs:us-east-2:110377003250:service/dk-dashboards/dk-dashboards-api-service"
            - export TASK_DEFINITION_FILE="deploy/aws/stage/task_definition.json"
            - *deploy_script

    production:
      - step:
          <<: *deploy_step
          runs-on:
            - self.hosted
            - linux.shell
            - prod
          script:
            - export AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID_PROD}"
            - export ECS_CLUSTER_NAME="${ECS_CLUSTER_NAME_PROD}"
            - export ECS_SERVICE_NAME="arn:aws:ecs:us-east-2:${AWS_ACCOUNT_ID_PROD}:service/dk-dashboards/dk-dashboards-web"
            - export TASK_DEFINITION_FILE="deploy/aws/prod/task_definition.json"
            - *deploy_script